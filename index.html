/* ===== EVENTS ===== */
function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{S.tab=el.dataset.tab;LS.set('tab',S.tab);render()});
  // Dark mode toggles
  const bindDark=id=>{const el=document.getElementById(id);if(el)el.onclick=()=>{S.darkMode=!S.darkMode;LS.set('darkMode',S.darkMode);document.documentElement.classList.toggle('dark',S.darkMode);render()}};
  bindDark('darkToggle');bindDark('darkToggle2');
  // Source language
  document.querySelectorAll('[data-srclang]').forEach(el=>el.onclick=()=>{S.srcLang=el.dataset.srclang;LS.set('srcLang',S.srcLang);render()});
  // Read
  const ri=document.getElementById('ri');if(ri)ri.oninput=()=>{S.inputText=ri.value;saveLastRead()};
  const hisBtn=document.getElementById('hisBtn');if(hisBtn)hisBtn.onclick=()=>{S.showReadHistory=!S.showReadHistory;render()};
  const closeHis=document.getElementById('closeHis');if(closeHis)closeHis.onclick=()=>{S.showReadHistory=false;render()};
  const hisOverlay=document.getElementById('hisOverlay');if(hisOverlay)hisOverlay.onclick=()=>{S.showReadHistory=false;render()};
  const newReadBtn=document.getElementById('newReadBtn');if(newReadBtn)newReadBtn.onclick=()=>{if(S.inputText.trim())saveReadingToHistory();S.inputText='';S.translatedText='';S.readWords=[];S.readWordList=[];S.readBookId=null;S.summaryEn='';S.summaryCn='';S.activeWord=null;saveLastRead();render()};
  // History events — collapsible language groups
  document.querySelectorAll('[data-histoggle]').forEach(el=>el.onclick=()=>{const l=el.dataset.histoggle;const c=LS.get('hisCollapsed',{});c[l]=!c[l];LS.set('hisCollapsed',c);render()});
  const hisStarToggle=document.getElementById('hisStarToggle');if(hisStarToggle)hisStarToggle.onclick=()=>{S.hisStarredOnly=!S.hisStarredOnly;render()};
  document.querySelectorAll('[data-hisstar]').forEach(el=>el.onclick=e=>{e.stopPropagation();toggleHisStar(+el.dataset.hisstar)});
  // Change history item language group via dropdown
  document.querySelectorAll('[data-hischglang]').forEach(el=>el.onchange=e=>{e.stopPropagation();const h=S.readHistory.find(x=>x.id===+el.dataset.hischglang);if(h){h.lang=el.value;h.readLang=el.value;saveReadHistory();render();toast('已移动到 '+getLangLabel(el.value))}});
  document.querySelectorAll('[data-loadhis]').forEach(el=>{el.onclick=e=>{if(e.target.closest('[data-delhis]')||e.target.closest('[data-hisstar]')||e.target.closest('[data-hischglang]'))return;const h=S.readHistory.find(x=>x.id===+el.dataset.loadhis);if(h)loadReadHistory(h)}});
  document.querySelectorAll('[data-delhis]').forEach(el=>el.onclick=e=>{e.stopPropagation();if(confirm('删除？'))delReadHistory(+el.dataset.delhis)});
  const clearAllHis=document.getElementById('clearAllHis');if(clearAllHis)clearAllHis.onclick=()=>{if(confirm('清空全部历史？')){S.readHistory=[];saveReadHistory();render()}};
  const tb=document.getElementById('tb');if(tb)tb.onclick=translateText;
  const mi=document.getElementById('mi');if(mi){mi.oninput=()=>{S.manualInput=mi.value};mi.onkeydown=e=>{if(e.key==='Enter'){const w=S.manualInput.trim();if(w){readWordClick(w,-1);S.manualInput=''}}}};
  const mlb=document.getElementById('mlb');if(mlb)mlb.onclick=()=>{const w=S.manualInput.trim();if(w){readWordClick(w,-1);S.manualInput=''}};
  document.querySelectorAll('[data-rw]').forEach(el=>el.onclick=()=>readWordClick(el.dataset.rwd,+el.dataset.rw));
  // Retry failed word lookups
  document.querySelectorAll('[data-retry]').forEach(el=>el.onclick=()=>{const w=el.dataset.retry;delete S.wordCache[w.toLowerCase()];readWordClick(w,-1)});
  document.querySelectorAll('[data-requery]').forEach(el=>el.onclick=()=>{const w=el.dataset.requery;forgetWord(w);readWordClick(w,-1)});
  const sb=document.getElementById('sumBtn');if(sb)sb.onclick=summarize;
  // File
  const fdz=document.getElementById('fileDropZone');const fi=document.getElementById('fileInput');
  if(fdz&&fi){fdz.onclick=()=>fi.click();fi.onchange=e=>{if(e.target.files[0])importFile(e.target.files[0])};fdz.ondragover=e=>{e.preventDefault();fdz.classList.add('drag-over')};fdz.ondragleave=()=>fdz.classList.remove('drag-over');fdz.ondrop=e=>{e.preventDefault();fdz.classList.remove('drag-over');if(e.dataTransfer.files[0])importFile(e.dataTransfer.files[0])}}
  document.querySelectorAll('[data-exp]').forEach(el=>el.onclick=()=>exportReadWords(el.dataset.exp));
  document.querySelectorAll('[data-scroll]').forEach(el=>el.onclick=()=>{const w=el.dataset.scroll.toLowerCase();const spans=document.querySelectorAll('[data-rwd]');for(const s of spans){if(s.dataset.rwd.toLowerCase()===w){s.scrollIntoView({behavior:'smooth',block:'center'});s.classList.add('active');setTimeout(()=>s.classList.remove('active'),1500);break}}});
  // Float
  const fc=document.getElementById('fc');
  if(fc){let dr=false,ox=0,oy=0;fc.onpointerdown=e=>{if(e.target.tagName==='BUTTON')return;dr=true;const r=fc.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;e.preventDefault()};document.onpointermove=e=>{if(dr){S.floatPos={x:e.clientX-ox,y:e.clientY-oy};fc.style.left=S.floatPos.x+'px';fc.style.top=S.floatPos.y+'px'}};document.onpointerup=()=>{dr=false}}
  const cfl=document.getElementById('cfl');if(cfl)cfl.onclick=()=>{S.activeWord=null;render()};
  // Books lang filter
  document.querySelectorAll('[data-blf]').forEach(el=>el.onclick=()=>{S.booksLangFilter=el.dataset.blf;LS.set('booksLangFilter',S.booksLangFilter);const filtered=getFilteredBooks();if(filtered.length){S.currentBookIdx=S.books.indexOf(filtered[0]);saveBookIdx()}render()});
  // Books
  const bnl=document.getElementById('bnl');if(bnl)bnl.onclick=()=>{S.editingBookName=true;render();const i=document.getElementById('bni');if(i){i.focus();i.select();const done=()=>{getBook().name=i.value.trim()||getBook().name;S.editingBookName=false;saveBooks();render()};i.onblur=done;i.onkeydown=e=>{if(e.key==='Enter')done()}}};
  const bs=document.getElementById('bs');if(bs)bs.onchange=()=>{S.currentBookIdx=+bs.value;S.bookSearch='';saveBookIdx();render()};
  const nbb=document.getElementById('nbb');if(nbb)nbb.onclick=()=>{const lang=S.srcLang;const name=getLangLabel(lang)+' 词汇本'+(S.books.filter(b=>b.lang===lang).length+1);S.books.push({id:Date.now(),name,lang,groups:[{id:Date.now()+1,name:'未分组',words:[]}]});S.currentBookIdx=S.books.length-1;saveBooks();saveBookIdx();render()};
  const dbb=document.getElementById('dbb');if(dbb)dbb.onclick=()=>{if(S.books.length<=1){toast('至少保留一个词汇本');return}const b=getBook();if(!confirm(`删除词汇本 "${b.name}"？其中 ${getAllWords(b).length} 个单词将丢失。`))return;S.books.splice(S.currentBookIdx,1);S.currentBookIdx=Math.min(S.currentBookIdx,S.books.length-1);saveBooks();saveBookIdx();render();toast('已删除')};
  const imb=document.getElementById('imb');if(imb)imb.onclick=()=>{S.showImportModal=true;render()};
  const agb=document.getElementById('agb');if(agb)agb.onclick=()=>{const b=getBook();let n='新分组',c=2;while(b.groups.some(g=>g.name===n)){n='新分组'+c++}const gid=Date.now();b.groups.push({id:gid,name:n,words:[]});S.editingGroupName=gid;saveBooks();render();const inp=document.querySelector(`[data-gni="${gid}"]`);if(inp){inp.focus();inp.select()}};
  const awb=document.getElementById('awb');if(awb)awb.onclick=()=>{S.showAddWordModal=true;render()};
  const afb=document.getElementById('afb');if(afb)afb.onclick=autoFill;
  const bsi=document.getElementById('bsi');if(bsi)bsi.oninput=()=>{S.bookSearch=bsi.value;render()};
  document.querySelectorAll('[data-tg]').forEach(el=>el.onclick=()=>{const gid=+el.dataset.tg;LS.set('gc_'+gid,!LS.get('gc_'+gid,false));render()});
  document.querySelectorAll('[data-egn]').forEach(el=>el.onclick=()=>{S.editingGroupName=+el.dataset.egn;render();const i=document.querySelector(`[data-gni="${el.dataset.egn}"]`);if(i){i.focus();i.select();const done=()=>{const g=getBook().groups.find(x=>x.id===+i.dataset.gni);if(g)g.name=i.value.trim()||g.name;S.editingGroupName=null;saveBooks();render()};i.onblur=done;i.onkeydown=e=>{if(e.key==='Enter')done()}}});
  document.querySelectorAll('[data-dg]').forEach(el=>el.onclick=()=>{if(!confirm('删除分组？'))return;const b=getBook();const gid=+el.dataset.dg;const g=b.groups.find(x=>x.id===gid);if(!g)return;let u=b.groups.find(x=>x.name==='未分组');if(!u){u={id:Date.now(),name:'未分组',words:[]};b.groups.push(u)};u.words.push(...g.words);b.groups=b.groups.filter(x=>x.id!==gid);saveBooks();render()});
  document.querySelectorAll('[data-star]').forEach(el=>el.onclick=e=>{e.stopPropagation();toggleStar(+el.dataset.sb,+el.dataset.sg,el.dataset.star)});
  document.querySelectorAll('[data-dw]').forEach(el=>el.onclick=()=>{if(confirm(`删除 "${el.dataset.dw}"?`))delWord(+el.dataset.dwb,+el.dataset.dwg,el.dataset.dw)});
  document.querySelectorAll('[data-mw]').forEach(el=>el.onclick=()=>{S.showMoveWordModal={word:el.dataset.mw,fg:+el.dataset.mfg};render()});
  // Favorites
  document.querySelectorAll('[data-fav]').forEach(el=>el.onclick=()=>{S.favFilter=el.dataset.fav==='all'?'all':+el.dataset.fav;render()});
  document.querySelectorAll('[data-favlang]').forEach(el=>el.onclick=()=>{S.favLang=el.dataset.favlang;S.favFilter='all';render()});
  document.querySelectorAll('[data-favexp]').forEach(el=>el.onclick=e=>{if(e.target.closest('[data-star]'))return;const key=el.dataset.favexp;S.favExpanded=S.favExpanded===key?null:key;render()});
  document.querySelectorAll('[data-bookexp]').forEach(el=>el.onclick=e=>{if(e.target.closest('[data-star],[data-mw],[data-dw]'))return;const key=el.dataset.bookexp;S.bookExpanded=S.bookExpanded===key?null:key;render()});
  // Flash lang
  document.querySelectorAll('[data-flashlang]').forEach(el=>el.onclick=()=>{S.flashLang=el.dataset.flashlang;S.flashBooks=[];render()});
  document.querySelectorAll('[data-flashbookall]').forEach(el=>el.onclick=()=>{S.flashBooks=[];render()});
  document.querySelectorAll('[data-flashbook]').forEach(el=>el.onclick=()=>{const id=+el.dataset.flashbook;const arr=(S.flashBooks||[]).slice();const i=arr.indexOf(id);if(i>=0)arr.splice(i,1);else arr.push(id);S.flashBooks=arr;render()});
  // Flash
  document.querySelectorAll('[data-fm]').forEach(el=>el.onclick=()=>{buildFlash(el.dataset.fm);render()});
  const fca=document.getElementById('fca');if(fca&&!S.flashShowAnswer)fca.onclick=()=>{S.flashShowAnswer=true;render()};
  document.querySelectorAll('[data-fr]').forEach(el=>el.onclick=()=>flashResult(el.dataset.fr==='1'));
  const rfb=document.getElementById('rfb');if(rfb)rfb.onclick=()=>{S.flashQueue=[];render()};
  const efb=document.getElementById('efb');if(efb)efb.onclick=()=>{S.flashQueue=[];render()};
  const sdb=document.getElementById('sdb');if(sdb)sdb.onclick=()=>{buildDict();render()};
  const di=document.getElementById('di');if(di){di.oninput=()=>{S.dictInput=di.value};di.onkeydown=e=>{if(e.key==='Enter'){S.dictResult?nextDict():checkDict()}};if(!S.dictResult)setTimeout(()=>di.focus(),50)};
  const cdb=document.getElementById('cdb');if(cdb)cdb.onclick=checkDict;
  const ndb=document.getElementById('ndb');if(ndb)ndb.onclick=nextDict;
  const rdb=document.getElementById('rdb');if(rdb)rdb.onclick=()=>{S.dictQueue=[];render()};
  const edb=document.getElementById('edb');if(edb)edb.onclick=()=>{S.dictQueue=[];render()};
  // Settings
  const _readApiForm=()=>{S.api.endpoint=(document.getElementById('ae')?.value||'').trim();S.api.key=(document.getElementById('ak')?.value||'').trim();S.api.model=(document.getElementById('am')?.value||'').trim();S.api.maxTok=Math.max(100,+(document.getElementById('amt')?.value)||4096)};
  const sab=document.getElementById('sab');if(sab)sab.onclick=()=>{_readApiForm();saveApi();toast('已保存')};
  const tab2=document.getElementById('tab2');if(tab2)tab2.onclick=()=>{_readApiForm();saveApi();testAPI()};
  const dab=document.getElementById('dab');if(dab)dab.onclick=()=>{S.api.enabled=false;saveApi();render();toast('已断开')};
  // Wallpaper events
  const wpUpload=document.getElementById('wpUpload');const wpFileInput=document.getElementById('wpFileInput');const wpPreview=document.getElementById('wpPreview');
  if(wpUpload&&wpFileInput){wpUpload.onclick=()=>wpFileInput.click();if(wpPreview&&!S._wpDataUrl)wpPreview.onclick=()=>wpFileInput.click();
    wpFileInput.onchange=async e=>{const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=async ev=>{S._wpDataUrl=ev.target.result;await saveWpToDB(S._wpDataUrl);S.wpSettings.enabled=true;
      if(S.wpSettings.fillMode==='auto'){S.wpSettings.fillColor=await detectWpColor(S._wpDataUrl)}
      saveWpSettings();applyWallpaper();render();toast('壁纸已设置')};reader.readAsDataURL(f)}}
  const wpToggle=document.getElementById('wpToggle');if(wpToggle)wpToggle.onclick=()=>{S.wpSettings.enabled=!S.wpSettings.enabled;saveWpSettings();applyWallpaper();render()};
  const wpRemove=document.getElementById('wpRemove');if(wpRemove)wpRemove.onclick=async()=>{S._wpDataUrl=null;S.wpSettings.enabled=false;await deleteWpFromDB();saveWpSettings();applyWallpaper();render();toast('壁纸已删除')};
  document.querySelectorAll('[data-wpsize]').forEach(el=>el.onclick=()=>{S.wpSettings.sizeMode=el.dataset.wpsize;saveWpSettings();applyWallpaper();render()});
  const wpColorPicker=document.getElementById('wpColorPicker');if(wpColorPicker)wpColorPicker.oninput=e=>{S.wpSettings.fillColor=e.target.value;S.wpSettings.fillMode='manual';saveWpSettings();applyWallpaper();render()};
  const wpAutoColor=document.getElementById('wpAutoColor');if(wpAutoColor)wpAutoColor.onclick=async()=>{if(S._wpDataUrl){S.wpSettings.fillColor=await detectWpColor(S._wpDataUrl);S.wpSettings.fillMode='auto';saveWpSettings();applyWallpaper();render();toast('已自动检测')}};
  const wpEyedropper=document.getElementById('wpEyedropper');if(wpEyedropper)wpEyedropper.onclick=async()=>{try{const ed=new EyeDropper();const r=await ed.open();S.wpSettings.fillColor=r.sRGBHex;S.wpSettings.fillMode='manual';saveWpSettings();applyWallpaper();render();toast('已吸取: '+r.sRGBHex)}catch{}};
  // Data
  const edb2=document.getElementById('edb2');if(edb2)edb2.onclick=()=>{const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify({books:S.books,api:{endpoint:S.api.endpoint,model:S.api.model},srcLang:S.srcLang,readHistory:S.readHistory,hisFolders:S.hisFolders,wpSettings:S.wpSettings,darkMode:S.darkMode,wordCache:S.wordCache},null,2));a.download='lingua-muse.json';a.click();toast('已导出')};
  const idb2=document.getElementById('idb2');if(idb2)idb2.onclick=()=>document.getElementById('ifi')?.click();
  const ifi2=document.getElementById('ifi');if(ifi2)ifi2.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.books){S.books=normalizeBooks(d.books);S.currentBookIdx=0;saveBooks();if(d.wordCache&&typeof d.wordCache==='object'){S.wordCache=d.wordCache;saveWordCache()}if(d.readHistory){S.readHistory=d.readHistory;saveReadHistory()}if(d.hisFolders){S.hisFolders=d.hisFolders;saveHisFolders()}if(d.darkMode!==undefined){S.darkMode=d.darkMode;LS.set('darkMode',S.darkMode);document.documentElement.classList.toggle('dark',S.darkMode)}render();toast('已导入')}}catch{toast('格式错误')}};r.readAsText(f)};
  const cab=document.getElementById('cab');if(cab)cab.onclick=()=>{if(confirm('确定重置所有数据？将清空本地存档与词缓存。')){LS.resetAll();try{localStorage.clear()}catch{}location.reload()}};
  document.querySelectorAll('#mo').forEach(el=>el.onclick=e=>{if(e.target===el){S.showImportModal=false;S.showAddWordModal=false;S.showMoveWordModal=null;render()}});
  const ci=document.getElementById('ci');if(ci)ci.onclick=()=>{S.showImportModal=false;render()};
  const coi=document.getElementById('coi');if(coi)coi.onclick=()=>{const t=document.getElementById('ita')?.value;if(t?.trim()){smartImport(t);S.showImportModal=false;render()}};
  const caw=document.getElementById('caw');if(caw)caw.onclick=()=>{S.showAddWordModal=false;render()};
  const cow=document.getElementById('cow');if(cow)cow.onclick=async()=>{const w=(document.getElementById('awi')?.value||'').trim();if(!w){toast('请输入单词');return};let t=(document.getElementById('ati')?.value||'').trim();const gid=+document.getElementById('ags')?.value;const b=getBook();const g=b.groups.find(x=>x.id===gid)||b.groups[0];if(!t){const prevLang=S.srcLang;S.srcLang=b.lang||'en';const info=await lookupWord(w);S.srcLang=prevLang;if(info){addToBook(info,g.name);S.showAddWordModal=false;render();return}}addToBook({word:w,translation:t||'(待补充)',phonetic:'',pos:'',examples:[]},g.name);S.showAddWordModal=false;render()};
  const cmv=document.getElementById('cmv');if(cmv)cmv.onclick=()=>{S.showMoveWordModal=null;render()};
  document.querySelectorAll('[data-mvt]').forEach(el=>el.onclick=()=>{const m=S.showMoveWordModal;if(m)moveWord(m.fg,m.word,+el.dataset.mvt);S.showMoveWordModal=null;render()});
}

/* ===== INIT ===== */
(async function init(){
  // Load wallpaper from IndexedDB
  const wpData=await loadWpFromDB();
  if(wpData){S._wpDataUrl=wpData;applyWallpaper()}
  render();
})();
</script>
</body>
</html>
